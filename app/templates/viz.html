<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Vue 3D — PKI-VAULT</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#F9F5F0;overflow:hidden;font-family:'Inter',sans-serif;color:#2D2A24}
#info{position:absolute;top:20px;left:50%;transform:translateX(-50%);background:rgba(255,252,248,0.7);backdrop-filter:blur(16px);padding:12px 24px;border-radius:40px;border:1px solid rgba(198,164,77,0.3);font-weight:600;z-index:10;box-shadow:0 4px 20px rgba(0,0,0,0.06);}
#info span{color:#C6A44D;}
#controls{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);display:flex;gap:12px;z-index:10;}
.ctrl{background:rgba(255,252,248,0.7);backdrop-filter:blur(12px);border:1px solid rgba(198,164,77,0.25);border-radius:40px;padding:8px 20px;font-size:.7rem;font-weight:600;color:#2D2A24;cursor:pointer;transition:.2s;box-shadow:0 2px 8px rgba(0,0,0,0.04);}
.ctrl:hover{background:rgba(198,164,77,0.15);border-color:#C6A44D;}
</style>
</head>
<body>
<div id="info"><span>✦</span> PKI-VAULT · Chaîne de confiance 3D</div>
<div id="controls">
  <button class="ctrl" id="animToggle">▶ Animer</button>
  <button class="ctrl" onclick="resetCam()">⌂ Reset</button>
  <a href="/" class="ctrl" style="text-decoration:none;">← Tableau</a>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// Scène claire
const scene=new THREE.Scene();
scene.background=new THREE.Color(0xF9F5F0);
const camera=new THREE.PerspectiveCamera(50,innerWidth/innerHeight,0.1,1000);
camera.position.set(0,8,24);
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);renderer.setPixelRatio(devicePixelRatio);
document.body.appendChild(renderer.domElement);
// Lumières douces
const amb=new THREE.AmbientLight(0xffeedd,0.5);
scene.add(amb);
const dir=new THREE.DirectionalLight(0xffeedd,1.2);
dir.position.set(5,12,8);scene.add(dir);
// Étoiles minimalistes (points)
const stars=new THREE.Points(
  new THREE.BufferGeometry().setFromPoints(Array.from({length:200},()=>new THREE.Vector3((Math.random()-.5)*80,(Math.random()-.5)*80,(Math.random()-.5)*80))),
  new THREE.PointsMaterial({color:0xC6A44D,size:0.12,transparent:true,opacity:0.3})
);
scene.add(stars);
// Root (or)
const root=new THREE.Mesh(new THREE.SphereGeometry(1.8,64,64),new THREE.MeshStandardMaterial({color:0xC6A44D,roughness:0.3,metalness:0.6,emissive:0xC6A44D,emissiveIntensity:0.1}));
root.position.set(0,3,0);scene.add(root);
// Inter (bronze)
const inter=new THREE.Mesh(new THREE.SphereGeometry(1.3,64,64),new THREE.MeshStandardMaterial({color:0xD4AF37,roughness:0.4,metalness:0.4}));
inter.position.set(3.5,0,0);scene.add(inter);
// Leaves (cubes)
const colors=[0x34A853,0x1E88E5,0xC6A44D,0xD32F2F];const leaves=[];
for(let i=0;i<8;i++){const mat=new THREE.MeshStandardMaterial({color:colors[i%colors.length],roughness:0.3,metalness:0.2});const cube=new THREE.Mesh(new THREE.BoxGeometry(.6,.6,.6),mat);const a=(i/8)*Math.PI*2;const r=4.5+(i%3)*1.5;cube.position.set(Math.cos(a)*r,-1+(i%3)*1.2,Math.sin(a)*r);scene.add(cube);leaves.push({mesh:cube,angle:a,radius:r,speed:.006+i*.002});}
// Anim
let anim=false,frame=0;
function animate(){requestAnimationFrame(animate);frame+=.01;root.rotation.y+=.003;inter.rotation.y+=.008;leaves.forEach(l=>{l.angle+=l.speed;if(anim){l.mesh.position.x=Math.cos(l.angle+frame*l.speed)*l.radius;l.mesh.position.z=Math.sin(l.angle+frame*l.speed)*l.radius;}l.mesh.rotation.x+=.01;l.mesh.rotation.y+=.02;});renderer.render(scene,camera);}
animate();
document.getElementById('animToggle').onclick=function(){anim=!anim;this.textContent=anim?'⏸ Pause':'▶ Animer';};
function resetCam(){camera.position.set(0,8,24);camera.lookAt(0,0,0);}
window.addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});
</script>
</body>
</html>
