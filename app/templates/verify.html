{% extends "base.html" %}
{% block content %}
<div class="row g-4"><div class="col-md-5"><div class="card"><div class="kpi-label">Vérifier</div>
<form method="post" enctype="multipart/form-data"><div class="mb-3"><label class="form-label">Fichier (.pem .crt)</label><input type="file" name="cert_file" class="form-control" accept=".pem,.crt" required></div>
<button type="submit" class="btn-metal">Analyser</button></form>
<div class="mt-3"><div class="kpi-label">Vérifications :</div><ul><li>Format X.509</li><li>Dates</li><li>Chaîne</li><li>CRL</li></ul></div></div></div>
{% if result %}<div class="col-md-7"><div class="card"><div class="d-flex justify-content-between"><span>Score</span><span class="h4">{{ result.score }}/{{ result.total }}</span></div><div class="progress"><div class="progress-bar" style="width:{{ result.pct }}%;background:{% if result.pct==100 %}#34A853{% else %}#D32F2F{% endif %}"></div></div><pre>{{ result.cert_info }}</pre></div></div>{% endif %}</div>
{% endblock %}
