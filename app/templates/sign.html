{% extends "base.html" %}
{% block content %}
<div class="row g-4"><div class="col-md-7"><div class="card"><div class="kpi-label">Signer une CSR</div>
<form method="post" enctype="multipart/form-data"><div class="mb-3"><label class="form-label">Fichier CSR</label><input type="file" name="csr_file" class="form-control" accept=".pem,.csr" required></div>
<div class="mb-3"><label class="form-label">CA signataire</label><select name="ca" class="form-select"><option value="inter">Intermediate CA</option><option value="root">Root CA</option></select></div>
<div class="mb-3"><label class="form-label">Type</label><div class="row g-2"><div class="col-6"><div class="form-check"><input class="form-check-input" type="radio" name="type" value="server" checked><label>Serveur</label></div></div><div class="col-6"><div class="form-check"><input class="form-check-input" type="radio" name="type" value="client"><label>Client</label></div></div></div></div>
<div class="mb-3"><label class="form-label">Durée</label><select name="days" class="form-select"><option value="90">90j</option><option value="365" selected>365j</option><option value="730">730j</option></select></div>
<button type="submit" class="btn-metal">Signer</button></form></div></div>
<div class="col-md-5"><div class="card"><div class="kpi-label">Sécurité</div><ul class="list-unstyled"><li><i class="fas fa-check text-success"></i> SAN inclus</li><li><i class="fas fa-check text-success"></i> SHA-1 rejeté</li><li><i class="fas fa-check text-success"></i> Série aléatoire</li></ul></div></div></div>
{% endblock %}
